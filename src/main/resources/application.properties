spring.application.name=quizzar-api
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

quizzar.auth.jwt.secret=${JWT_SECRET}
quizzar.auth.jwt.expiration-ms=${JWT_EXPIRATION_MS}

google.client-id=${GOOGLE_CLIENT_ID}

spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=true
quizzar.mail.from=${MAIL_FROM}

quizzar.gemini.api-key=${GEMINI_API_KEY}
quizzar.gemini.model=${GEMINI_MODEL}
quizzar.gemini.base-url=https://generativelanguage.googleapis.com

spring.data.redis.url=${SPRING_DATA_REDIS_URL}
spring.data.redis.ssl.enabled=true
spring.data.redis.timeout=5000ms
spring.data.redis.connect-timeout=5000ms

spring.cache.type=redis
spring.cache.redis.time-to-live=600000

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.s3.region=${AWS_S3_REGION}
aws.s3.presigned-url-expiry-minutes=${AWS_S3_PRESIGNED_URL_EXPIRY_MINUTES}

quizzar.base-url=${QUIZZAR_BASE_URL}
quizzar.max-file-size-mb=${QUIZZAR_MAX_FILE_SIZE_MB:20}
quizzar.pass-threshold-percent=${QUIZZAR_PASS_THRESHOLD_PERCENT:50}
quizzar.allowed-file-types=\
  application/pdf,\
  application/vnd.openxmlformats-officedocument.wordprocessingml.document,\
  application/msword,\
  text/plain

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.show-actuator=false
springdoc.default-produces-media-type=application/json

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=WHEN_AUTHORIZED
management.prometheus.metrics.export.enabled=true

logging.pattern.console={"timestamp":"%d{ISO8601}","level":"%level","traceId":"%X{traceId}","logger":"%logger{36}","message":"%message"}%n
logging.level.com.quizzar=INFO
logging.level.org.springframework.security=WARN

fe.base-url=${FE_URL}