<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Feedback</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; color: #333; line-height: 1.5;">
<h2>New App Feedback</h2>

<p><strong>From:</strong> <span th:text="${user}">sender@example.com</span></p>

<p><strong>Message:</strong></p>
<div style="background-color: #f5f5f5; padding: 15px; border-radius: 5px; white-space: pre-wrap; margin-bottom: 20px;">
    <span th:text="${text}">Feedback message text...</span>
</div>

<!-- Render the screenshot using the presigned URL if it was provided -->
<div th:if="${imageUrl}" style="margin-top: 20px;">
    <p><strong>Screenshot:</strong></p>
    <a th:href="${imageUrl}" target="_blank">
        <img th:src="${imageUrl}" style="max-width: 100%; max-height: 400px; border: 1px solid #ddd; border-radius: 8px;" alt="Feedback Screenshot" />
    </a>
    <p style="margin-top: 8px;">
        <a th:href="${imageUrl}" target="_blank" style="color: #00bcd4; font-size: 13px; text-decoration: none; font-weight: bold;">
            Open image in new tab ↗
        </a>
    </p>
</div>
</body>
</html>
