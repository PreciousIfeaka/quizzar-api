spring:
  application:
    name: quizzar-api

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI}

  ai:
    google:
      genaiai:
        api-key: ${GOOGLE_AI_API_KEY}
        chat:
          options:
            model: ${GOOGLE_AI_MODEL:gemini-1.5-pro}
            temperature: 0.3
            max-output-tokens: 8192

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 3000ms

  cache:
    type: redis
    redis:
      time-to-live: 600000

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME}
    region: ${AWS_S3_REGION:us-east-1}
    presigned-url-expiry-minutes: ${AWS_S3_PRESIGNED_URL_EXPIRY_MINUTES:15}

quizzar:
  base-url: ${QUIZZAR_BASE_URL:http://localhost:8080}
  max-file-size-mb: ${QUIZZAR_MAX_FILE_SIZE_MB:20}
  pass-threshold-percent: ${QUIZZAR_PASS_THRESHOLD_PERCENT:50}
  allowed-file-types:
    - application/pdf
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - application/msword
    - text/plain

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%level","traceId":"%X{traceId}","logger":"%logger{36}","message":"%message"}%n'
  level:
    com.quizzar: INFO
    org.springframework.security: WARN
